naftiko: "1.0.0-alpha1"

info:
  label: "AppLovin Growth Asset Reporting"
  description: "Creative-level performance reporting for AppDiscovery / Axon campaigns."
  tags:
    - AppLovin
    - Growth
    - Creatives
    - Reporting
  created: "2026-05-05"
  modified: "2026-05-05"

binds:
  - namespace: env
    keys:
      APPLOVIN_REPORT_KEY: APPLOVIN_REPORT_KEY

capability:
  consumes:
    - type: http
      namespace: applovin-growth-asset-reporting
      baseUri: https://r.applovin.com
      description: "AppDiscovery / Axon creative-level reporting."
      authentication:
        type: apikey
        key: api_key
        value: "{{APPLOVIN_REPORT_KEY}}"
        placement: query
      resources:
        - name: asset-report
          path: /assetReport
          description: "Creative report by symbolic time range."
          operations:
            - name: get-asset-report
              method: GET
              description: "Get asset report for a symbolic range."
              inputParameters:
                - name: range
                  in: query
                  type: string
                  required: true
                  description: "yesterday, last_7d, or last_month."
                - name: columns
                  in: query
                  type: string
                  required: true
                  description: "Comma-separated columns."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: asset-analytics-report
          path: /assetAnalyticsReport
          description: "Creative report by date range."
          operations:
            - name: get-asset-analytics-report
              method: GET
              description: "Get asset report for a custom date range."
              inputParameters:
                - name: start
                  in: query
                  type: string
                  required: true
                  description: "Start date YYYY-MM-DD."
                - name: end
                  in: query
                  type: string
                  required: true
                  description: "End date YYYY-MM-DD."
                - name: columns
                  in: query
                  type: string
                  required: true
                  description: "Comma-separated columns."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
