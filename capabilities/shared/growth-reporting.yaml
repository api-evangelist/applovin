naftiko: "1.0.0-alpha1"

info:
  label: "AppLovin Growth Reporting"
  description: "AppDiscovery / Axon campaign-level performance reporting for advertisers and publishers."
  tags:
    - AppLovin
    - Growth
    - AppDiscovery
    - Reporting
  created: "2026-05-05"
  modified: "2026-05-05"

binds:
  - namespace: env
    keys:
      APPLOVIN_REPORT_KEY: APPLOVIN_REPORT_KEY

capability:
  consumes:
    - type: http
      namespace: applovin-growth-reporting
      baseUri: https://r.applovin.com
      description: "AppDiscovery / Axon reporting endpoint."
      authentication:
        type: apikey
        key: api_key
        value: "{{APPLOVIN_REPORT_KEY}}"
        placement: query
      resources:
        - name: report
          path: /report
          description: "Aggregated campaign report rows."
          operations:
            - name: get-growth-report
              method: GET
              description: "Get Growth (publisher or advertiser) report rows."
              inputParameters:
                - name: start
                  in: query
                  type: string
                  required: true
                  description: "Start date or epoch."
                - name: end
                  in: query
                  type: string
                  required: true
                  description: "End date, epoch, or 'now'."
                - name: format
                  in: query
                  type: string
                  required: true
                  description: "Response format: json or csv."
                - name: columns
                  in: query
                  type: string
                  required: true
                  description: "Comma-separated list of columns."
                - name: report_type
                  in: query
                  type: string
                  required: false
                  description: "publisher or advertiser."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
