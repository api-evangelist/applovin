naftiko: "1.0.0-alpha1"

info:
  label: "AppLovin Conversion API for Lead Generation"
  description: "Server-to-server CAPI for posting page_view and generate_lead events to AppLovin / Axon."
  tags:
    - AppLovin
    - CAPI
    - Conversion Tracking
    - Lead Generation
  created: "2026-05-05"
  modified: "2026-05-05"

binds:
  - namespace: env
    keys:
      APPLOVIN_CAPI_KEY: APPLOVIN_CAPI_KEY

capability:
  consumes:
    - type: http
      namespace: applovin-conversion-api-lead-gen
      baseUri: https://b.applovin.com
      description: "AppLovin server-to-server conversion ingestion."
      authentication:
        type: bearer
        token: "{{APPLOVIN_CAPI_KEY}}"
      resources:
        - name: events
          path: /v1/event
          description: "Conversion event ingestion."
          operations:
            - name: post-conversion-events
              method: POST
              description: "Post a batch of conversion events (up to 100)."
              inputParameters:
                - name: pixel_id
                  in: query
                  type: string
                  required: true
                  description: "Axon Event Key for the destination pixel."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  events: "{{tools.events}}"
